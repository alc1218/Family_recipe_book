<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5ecd7"/>
      <stop offset="1" stop-color="#d9c89a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.2" cy="0.2" r="0.8">
      <stop offset="0" stop-color="#fff5d6" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#f5ecd7" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="#6a4f33" opacity="0.18"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Top ornament -->
  <text x="600" y="140" text-anchor="middle"
        font-family="Playfair Display, Georgia, serif" font-style="italic"
        font-size="22" fill="#6a4f33" letter-spacing="8">— A COLLECTION OF —</text>

  <!-- Title -->
  <text x="600" y="270" text-anchor="middle"
        font-family="Playfair Display, Georgia, serif" font-weight="700"
        font-size="96" fill="#8a3324">Our Family</text>
  <text x="600" y="380" text-anchor="middle"
        font-family="Playfair Display, Georgia, serif" font-weight="700"
        font-size="96" fill="#8a3324">
    <tspan font-style="italic" fill="#6a4f33" font-weight="500">&amp;</tspan>
    Recipe Book
  </text>

  <!-- Tagline -->
  <text x="600" y="450" text-anchor="middle"
        font-family="Caveat, cursive" font-size="40" fill="#6a4f33">
    passed down, with love, from kitchen to kitchen
  </text>

  <!-- Divider -->
  <line x1="430" y1="500" x2="770" y2="500" stroke="#6a4f33" stroke-width="1" opacity="0.5"/>
  <text x="600" y="510" text-anchor="middle" font-size="22" fill="#6a4f33">✦</text>

  <!-- Footer attribution -->
  <text x="600" y="580" text-anchor="middle"
        font-family="Cormorant Garamond, Georgia, serif" font-style="italic"
        font-size="22" fill="#6a4f33">
    Created by Arcadi Llanza
  </text>
</svg>
